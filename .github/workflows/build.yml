name: Build and Test Smart Campus Application

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # Also update to v4 if not already
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4  # Also update to v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: mvn -B clean compile --file pom.xml
    
    - name: Run tests
      run: mvn -B test --file pom.xml
    
    - name: Package application
      run: mvn -B package -DskipTests --file pom.xml
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4  # Changed from v3 to v4
      with:
        name: smart-campus-app
        path: target/*.jar
        retention-days: 30  # Optional: how long to keep artifacts

name: Build and Test Smart Campus Application

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        cache-dependency-path: '**/pom.xml'
    
    - name: Find and build with Maven
      run: |
        # Find pom.xml and run maven from that directory
        POM_PATH=$(find . -name "pom.xml" -type f | head -1)
        POM_DIR=$(dirname $POM_PATH)
        echo "Found pom.xml in: $POM_DIR"
        cd $POM_DIR
        mvn -B clean compile
        mvn -B test
    
    - name: Package application
      run: |
        POM_PATH=$(find . -name "pom.xml" -type f | head -1)
        POM_DIR=$(dirname $POM_PATH)
        cd $POM_DIR
        mvn -B package -DskipTests
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: smart-campus-app
        path: |
          **/target/*.jar

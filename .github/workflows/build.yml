name: Build and Test Smart Campus Application

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./smart-campus  # Set working directory to the subfolder
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        cache-dependency-path: './smart-campus/pom.xml'  # Point to correct pom.xml
    
    - name: Build with Maven
      run: mvn -B clean compile  # Now runs in smart-campus folder
    
    - name: Run tests
      run: mvn -B test
    
    - name: Package application
      run: mvn -B package -DskipTests
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: smart-campus-app
        path: smart-campus/target/*.jar  # Path from root
